name: Ansible Lint

on:
  push:
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-lint.yml'
  pull_request:
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-lint.yml'

jobs:
  lint:
    name: Lint Ansible Playbooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Install required Ansible collections
        run: ansible-galaxy collection install community.general

      - name: Run ansible-lint
        run: |
          ansible-lint ansible/playbook-*.yml \
            --profile min \
            --skip-list fqcn[action-core] \
            --skip-list fqcn[action] \
            --skip-list no-changed-when \
            --skip-list ignore-errors \
            --skip-list risky-file-permissions \
            --skip-list command-instead-of-module \
            --skip-list yaml[truthy] \
            --skip-list yaml[new-line-at-end-of-file]