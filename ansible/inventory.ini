# Fill in IPs after terraform apply
# Run: terraform output to get IPs

[vm_running]
vm-running ansible_host=FILL_AFTER_TERRAFORM ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa

[vm_resize]
vm-resize ansible_host=FILL_AFTER_TERRAFORM ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa

[vm_snooze]
vm-snooze ansible_host=FILL_AFTER_TERRAFORM ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa

[vm_destroy]
vm-destroy ansible_host=FILL_AFTER_TERRAFORM ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa

[all_vms:children]
vm_running
vm_resize
vm_snooze
vm_destroy

[all_vms:vars]
ansible_python_interpreter=/usr/bin/python3
azure_region=centralus
vm_size=Standard_B1s